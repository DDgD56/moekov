<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<!-- 개발 중: 브라우저 캐시 끄기 (파일 저장 후 새로고침하면 바로 반영) -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>MoeKov</title>
<!-- CSS도 매 로드마다 타임스탬프로 캐시 무효화 (스타일 수정 즉시 반영) -->
<script>document.write('<link rel="stylesheet" href="style.css?t='+Date.now()+'">');</script>
</head>
<body>
<canvas id="cv"></canvas>

<div id="hud">
  <div id="hud-tl">
    <div id="hpbar"><div id="hpfill"></div><span id="hptext"></span></div>
    <div id="stambar"><div id="stamfill"></div></div>
    <div id="coins">🪙 0</div>
    <div id="quest"></div>
  </div>
  <div id="hud-tc"><span id="clock"></span></div>
  <div id="kills"></div>
  <div id="bossbar"><div id="bossfill"></div><span id="bossname">👑 황금 미니 킹</span></div>
  <div id="hud-br">
    <div id="gunname"></div>
    <div id="ammo"></div>
  </div>
  <div id="hud-bl"></div>
</div>

<div id="qslots">
  <div class="qslot" data-i="0"><span class="qs-key">3</span><span class="qs-emoji"></span><span class="qs-heal"></span></div>
  <div class="qslot" data-i="1"><span class="qs-key">4</span><span class="qs-emoji"></span><span class="qs-heal"></span></div>
  <div class="qslot" data-i="2"><span class="qs-key">5</span><span class="qs-emoji"></span><span class="qs-heal"></span></div>
</div>

<button id="musicBtn" title="배경음악 켜기/끄기">🔊</button>
<div id="toast"></div>
<div id="redflash"></div>
<div id="panel-root" class="hidden"></div>
<div id="drag-layer"></div>

<!-- 브라우저 확대/축소 차단 (핀치줌·Ctrl휠·Ctrl+/-/0·더블탭) -->
<script>
(function(){
  // Ctrl/⌘ + 마우스휠 줌
  window.addEventListener('wheel', function(e){
    if(e.ctrlKey || e.metaKey) e.preventDefault();
  }, {passive:false});
  // 트랙패드 핀치 줌 (Safari 제스처 + 크롬 ctrl휠은 위에서 처리)
  ['gesturestart','gesturechange','gestureend'].forEach(function(g){
    window.addEventListener(g, function(e){ e.preventDefault(); }, {passive:false});
  });
  // 키보드 줌: Ctrl/⌘ + (=,+,-,0,숫자패드)
  window.addEventListener('keydown', function(e){
    if((e.ctrlKey || e.metaKey) &&
       ['=','+','-','_','0'].indexOf(e.key) !== -1){
      e.preventDefault();
    }
  }, {passive:false});
  // 모바일 더블탭 줌
  var lastTouch = 0;
  document.addEventListener('touchend', function(e){
    var now = e.timeStamp;
    if(now - lastTouch <= 350) e.preventDefault();
    lastTouch = now;
  }, {passive:false});
  // 멀티터치(핀치) 자체 차단
  document.addEventListener('touchmove', function(e){
    if(e.touches.length > 1) e.preventDefault();
  }, {passive:false});
})();
</script>

<!-- 개발용: 매 로드마다 타임스탬프를 붙여 캐시를 항상 무효화 (저장→F5 하면 바로 반영) -->
<script>
  var _t = Date.now();
  [
    'sprite.js','data.js','icons.js','inventory.js','gun.js','music.js',
    'core.js','map.js','combat.js','systems.js','ui.js',
    'render-entities.js','render-world.js','render.js','main.js'
  ].forEach(function(f){
    document.write('<scr'+'ipt src="'+f+'?t='+_t+'"></scr'+'ipt>');
  });
</script>
</body>
</html>
